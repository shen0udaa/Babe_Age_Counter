<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --rose: #e8a0bf;
    --rose-deep: #c9749a;
    --rose-light: #f5d5e0;
    --cream: #fef6f0;
    --gold: #d4a574;
    --gold-light: #f0d9b5;
    --plum: #6b3a5a;
    --plum-light: #8e5578;
    --white: #ffffff;
    --soft-shadow: 0 8px 32px rgba(107, 58, 90, 0.12);
  }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .bg {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #fef6f0 0%, #f5d5e0 30%, #e8a0bf 60%, #d4a574 100%);
    background-size: 400% 400%;
    animation: gradientShift 12s ease infinite;
    z-index: -2;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .hearts-container {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    pointer-events: none;
  }

  .heart {
    position: absolute;
    font-size: 1.2rem;
    opacity: 0;
    animation: floatHeart linear infinite;
  }

  @keyframes floatHeart {
    0% { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity: 0; }
    10% { opacity: 0.4; }
    90% { opacity: 0.2; }
    100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; }
  }

  .setup-screen, .counter-screen {
    width: 100%;
    max-width: 420px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .hidden { display: none !important; }

  .logo-icon {
    font-size: 4rem;
    filter: drop-shadow(0 4px 12px rgba(200, 100, 150, 0.3));
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  h1 {
    font-size: 2rem;
    font-weight: 800;
    color: var(--plum);
    text-align: center;
    line-height: 1.4;
  }

  .subtitle {
    font-size: 1rem;
    color: var(--plum-light);
    text-align: center;
    font-weight: 300;
  }

  .input-group {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .input-group label {
    font-size: 0.95rem;
    color: var(--plum);
    font-weight: 600;
  }

  .input-group input {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid var(--rose-light);
    border-radius: 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.1rem;
    color: var(--plum);
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    outline: none;
    text-align: center;
  }

  .input-group input:focus {
    border-color: var(--rose-deep);
    background: rgba(255,255,255,0.9);
    box-shadow: 0 0 0 4px rgba(232, 160, 191, 0.2);
  }

  .btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 20px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--rose-deep), var(--plum-light));
    color: var(--white);
    box-shadow: 0 6px 24px rgba(107, 58, 90, 0.3);
  }

  .btn-primary:active {
    transform: scale(0.97);
    box-shadow: 0 2px 12px rgba(107, 58, 90, 0.2);
  }

  .baby-name-display {
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--plum);
    text-align: center;
    text-shadow: 0 2px 8px rgba(107, 58, 90, 0.1);
  }

  .age-main {
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(20px);
    border-radius: 28px;
    padding: 28px 20px;
    width: 100%;
    box-shadow: var(--soft-shadow);
    border: 1px solid rgba(255,255,255,0.6);
  }

  .age-primary {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .age-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 72px;
  }

  .age-number {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    font-weight: 700;
    color: var(--plum);
    line-height: 1;
  }

  .age-label {
    font-size: 0.8rem;
    color: var(--rose-deep);
    font-weight: 600;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .age-divider {
    width: 60%;
    margin: 0 auto 16px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--rose), transparent);
  }

  .age-secondary {
    display: flex;
    justify-content: center;
    gap: 16px;
  }

  .time-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .time-number {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--rose-deep);
    line-height: 1;
  }

  .time-label {
    font-size: 0.7rem;
    color: var(--plum-light);
    font-weight: 400;
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .total-card {
    background: linear-gradient(135deg, var(--plum), var(--rose-deep));
    border-radius: 20px;
    padding: 18px;
    width: 100%;
    text-align: center;
    box-shadow: 0 6px 24px rgba(107, 58, 90, 0.25);
  }

  .total-label {
    font-size: 0.85rem;
    color: var(--rose-light);
    font-weight: 300;
  }

  .total-number {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--white);
    margin: 4px 0;
  }

  .total-sub {
    font-size: 0.8rem;
    color: var(--gold-light);
    font-weight: 400;
  }

  .birthday-info {
    font-size: 0.85rem;
    color: var(--plum-light);
    text-align: center;
    font-weight: 300;
  }

  .btn-reset {
    background: rgba(255,255,255,0.4);
    color: var(--plum-light);
    font-size: 0.9rem;
    padding: 12px;
    margin-top: 4px;
  }

  .btn-reset:active {
    background: rgba(255,255,255,0.6);
  }

  .tick {
    animation: tickPulse 1s ease-in-out;
  }

  @keyframes tickPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); color: var(--gold); }
    100% { transform: scale(1); }
  }

  .next-bday {
    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 14px;
    width: 100%;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.5);
  }

  .next-bday-label {
    font-size: 0.8rem;
    color: var(--plum-light);
    font-weight: 400;
  }

  .next-bday-value {
    font-size: 1.1rem;
    color: var(--plum);
    font-weight: 700;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="hearts-container" id="hearts"></div>

<!-- Setup Screen -->
<div class="setup-screen" id="setupScreen">
  <div class="logo-icon">👶🏻💕</div>
  <h1>Baby Age Counter</h1>
  <p class="subtitle">Enter the birth date and watch the age live</p>

  <div class="input-group">
    <label>Baby's Name</label>
    <input type="text" id="babyName" placeholder="Enter name here...">
  </div>

  <div class="input-group">
    <label>Date of Birth</label>
    <input type="date" id="birthDate">
  </div>

  <div class="input-group">
    <label>Time of Birth (optional)</label>
    <input type="time" id="birthTime" value="00:00">
  </div>

  <button class="btn btn-primary" onclick="startCounter()">Start Counter 🎀</button>
</div>

<!-- Counter Screen -->
<div class="counter-screen hidden" id="counterScreen">
  <div class="logo-icon">👸🏻</div>
  <div class="baby-name-display" id="nameDisplay"></div>

  <div class="age-main">
    <div class="age-primary">
      <div class="age-unit">
        <div class="age-number" id="years">0</div>
        <div class="age-label">Years</div>
      </div>
      <div class="age-unit">
        <div class="age-number" id="months">0</div>
        <div class="age-label">Months</div>
      </div>
      <div class="age-unit">
        <div class="age-number" id="days">0</div>
        <div class="age-label">Days</div>
      </div>
    </div>
    <div class="age-divider"></div>
    <div class="age-secondary">
      <div class="time-unit">
        <div class="time-number" id="hours">0</div>
        <div class="time-label">Hours</div>
      </div>
      <div class="time-unit">
        <div class="time-number" id="minutes">0</div>
        <div class="time-label">Minutes</div>
      </div>
      <div class="time-unit">
        <div class="time-number" id="seconds">0</div>
        <div class="time-label">Seconds</div>
      </div>
    </div>
  </div>

  <div class="total-card">
    <div class="total-label">Total Days Since Birth</div>
    <div class="total-number" id="totalDays">0</div>
    <div class="total-sub" id="totalWeeks">0 weeks</div>
  </div>

  <div class="next-bday">
    <div class="next-bday-label">🎂 Next Birthday In</div>
    <div class="next-bday-value" id="nextBday">--</div>
  </div>

  <div class="birthday-info" id="bdayInfo"></div>

  <button class="btn btn-reset" onclick="resetCounter()">Change Details</button>
</div>

<script>
  // Floating hearts
  function createHearts() {
    const container = document.getElementById('hearts');
    const symbols = ['💕', '💗', '🩷', '✨', '🌸', '🎀', '💖'];
    for (let i = 0; i < 15; i++) {
      const heart = document.createElement('span');
      heart.className = 'heart';
      heart.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      heart.style.left = Math.random() * 100 + '%';
      heart.style.animationDuration = (8 + Math.random() * 12) + 's';
      heart.style.animationDelay = (Math.random() * 10) + 's';
      heart.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
      container.appendChild(heart);
    }
  }
  createHearts();

  let birthDateTime = null;
  let timerInterval = null;

  function saveData(name, date, time) {
    try {
      const data = JSON.stringify({ name, date, time });
      document.cookie = `babyAge=${encodeURIComponent(data)};max-age=31536000;path=/;SameSite=Lax`;
    } catch(e) {}
  }

  function loadData() {
    try {
      const match = document.cookie.match(/babyAge=([^;]+)/);
      if (match) return JSON.parse(decodeURIComponent(match[1]));
    } catch(e) {}
    return null;
  }

  function clearData() {
    document.cookie = 'babyAge=;max-age=0;path=/;SameSite=Lax';
  }

  // Check saved
  const savedData = loadData();
  if (savedData) {
    showCounter(savedData.name, savedData.date, savedData.time);
  }

  function startCounter() {
    const name = document.getElementById('babyName').value.trim() || 'My Baby';
    const date = document.getElementById('birthDate').value;
    const time = document.getElementById('birthTime').value || '00:00';

    if (!date) {
      document.getElementById('birthDate').style.borderColor = '#e74c3c';
      return;
    }

    saveData(name, date, time);
    showCounter(name, date, time);
  }

  function showCounter(name, date, time) {
    document.getElementById('setupScreen').classList.add('hidden');
    document.getElementById('counterScreen').classList.remove('hidden');
    document.getElementById('nameDisplay').textContent = name + ' 💕';

    birthDateTime = new Date(date + 'T' + (time || '00:00') + ':00');

    const options = { year: 'numeric', month: 'long', day: 'numeric' };
    const formatted = birthDateTime.toLocaleDateString('en-US', options);
    const dayName = birthDateTime.toLocaleDateString('en-US', { weekday: 'long' });
    document.getElementById('bdayInfo').textContent = `Born on ${dayName}, ${formatted}`;

    updateCounter();
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(updateCounter, 1000);
  }

  function updateCounter() {
    const now = new Date();
    const birth = birthDateTime;

    let years = now.getFullYear() - birth.getFullYear();
    let months = now.getMonth() - birth.getMonth();
    let days = now.getDate() - birth.getDate();

    if (days < 0) {
      months--;
      const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
      days += prevMonth.getDate();
    }
    if (months < 0) {
      years--;
      months += 12;
    }

    let hours = now.getHours() - birth.getHours();
    let minutes = now.getMinutes() - birth.getMinutes();
    let seconds = now.getSeconds() - birth.getSeconds();

    if (seconds < 0) { seconds += 60; minutes--; }
    if (minutes < 0) { minutes += 60; hours--; }
    if (hours < 0) {
      hours += 24;
      days--;
      if (days < 0) {
        months--;
        if (months < 0) { months += 12; years--; }
        const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
        days += prevMonth.getDate();
      }
    }

    document.getElementById('years').textContent = years;
    document.getElementById('months').textContent = months;
    document.getElementById('days').textContent = days;
    document.getElementById('hours').textContent = hours;
    document.getElementById('minutes').textContent = minutes;

    const secEl = document.getElementById('seconds');
    secEl.textContent = seconds;
    secEl.classList.remove('tick');
    void secEl.offsetWidth;
    secEl.classList.add('tick');

    const diffMs = now - birth;
    const totalDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
    const totalWeeks = Math.floor(totalDays / 7);
    document.getElementById('totalDays').textContent = totalDays.toLocaleString('en');
    document.getElementById('totalWeeks').textContent = totalWeeks.toLocaleString('en') + ' weeks';

    let nextBday = new Date(now.getFullYear(), birth.getMonth(), birth.getDate());
    if (nextBday <= now) {
      nextBday = new Date(now.getFullYear() + 1, birth.getMonth(), birth.getDate());
    }
    const daysToNext = Math.ceil((nextBday - now) / (1000 * 60 * 60 * 24));
    if (daysToNext === 0) {
      document.getElementById('nextBday').textContent = '🎉 Happy Birthday Today!';
    } else {
      document.getElementById('nextBday').textContent = daysToNext + ' days';
    }
  }

  function resetCounter() {
    clearData();
    if (timerInterval) clearInterval(timerInterval);
    document.getElementById('counterScreen').classList.add('hidden');
    document.getElementById('setupScreen').classList.remove('hidden');
  }
</script>
</body>
</html>
